          missing=0
          required_vars=(
            PRODUCTION API_KEY AUTH_DOMAIN DATABASE_URL PROJECT_ID STORAGE_BUCKET
            MESSAGING_SENDER_ID APP_ID RECAPTCHA_KEY ANTHROPIC_API_KEY CRAWL4AI_API_KEY
            OPENAI_API_KEY GROQ_API_KEY GOOGLE_API_KEY JINAAI_API_KEY UPSTASH_REDIS_REST_URL
            UPSTASH_REDIS_REST_PORT UPSTASH_REDIS_REST_USER UPSTASH_REDIS_REST_PASSWORD
            UPSTASH_REDIS_REST_TOKEN API_CRAWL4AI_URL API_ARACHNEFLY_URL 
            STRIPE_PUBLIC_KEY GCP_PROJECT_ID MEASUREMENT_ID COOKIE_SECRET CSRF_COOKIE_SECRET
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required env: $var_name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

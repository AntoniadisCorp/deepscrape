        run: |
          echo "Active gcloud account:"
          gcloud auth list --filter=status:ACTIVE --format="value(account)"
          echo "Active gcloud project:"
          gcloud config get-value project
          echo "Workflow target project: ${FIREBASE_PROJECT_ID}"

      - name: Prepare functions .env for deploy analysis
        if: needs.detect_changes.outputs.functions == 'true'
        run: |
          cat > functions/.env <<EOF
          PRODUCTION=true
          API_CRAWL4AI_URL=${API_CRAWL4AI_URL}

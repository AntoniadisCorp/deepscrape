        run: bun run build:staging
      - name: Build Firebase Functions
        if: needs.detect_changes.outputs.functions == 'true'
        working-directory: ./functions
        run: bun run build
      - name: Deploy to Firebase Hosting
        if: needs.detect_changes.outputs.angular == 'true' || needs.detect_changes.outputs.functions == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: libnet-d76db
          channelId: pr-${{ github.event.pull_request.number }}
          entryPoint: "."
          expires: 10d
        env:
          PRODUCTION: true
          EMULATORS: "false"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
          STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}

          if [ -f "functions/databases/IP2LOCATION-LITE-DB11.BIN" ]; then
            ls -lh "functions/databases/IP2LOCATION-LITE-DB11.BIN"
          elif [ -f "databases/IP2LOCATION-LITE-DB11.BIN" ]; then
            ls -lh "databases/IP2LOCATION-LITE-DB11.BIN"
          elif [ -f "IP2LOCATION-LITE-DB11.BIN" ]; then
            ls -lh "IP2LOCATION-LITE-DB11.BIN"
          else
            echo "Missing IP2LOCATION-LITE-DB11.BIN in functions/databases or databases or repo root" && exit 1
          fi
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: Validate Required Environment Variables

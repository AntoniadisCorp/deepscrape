name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.changes.outputs.functions }}
      angular: ${{ steps.changes.outputs.angular }}
      lfs: ${{ steps.changes.outputs.lfs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            functions:
              - 'functions/**'
            angular:
              - 'src/**'
            lfs:
              - '**/*.BIN'

  build_and_deploy:
    needs: detect_changes
    runs-on: ubuntu-latest
    env:
      DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
      FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      IP2LOCATION_GCS_PATH: ${{ vars.IP2LOCATION_GCS_PATH }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Pull Git LFS files (if LFS changes)
        if: needs.detect_changes.outputs.lfs == 'true'
        run: |
          git lfs install --local || true
          git lfs pull --include="functions/databases/*.BIN" || true

      - name: Verify IP2LOCATION DB
        if: needs.detect_changes.outputs.functions == 'true' || needs.detect_changes.outputs.lfs == 'true'
        run: |
          if [ -f "functions/databases/IP2LOCATION-LITE-DB11.BIN" ]; then
            ls -lh "functions/databases/IP2LOCATION-LITE-DB11.BIN"
          elif [ -f "databases/IP2LOCATION-LITE-DB11.BIN" ]; then
            ls -lh "databases/IP2LOCATION-LITE-DB11.BIN"
          elif [ -f "IP2LOCATION-LITE-DB11.BIN" ]; then
            ls -lh "IP2LOCATION-LITE-DB11.BIN"
          else
            echo "IP2LOCATION DB not found (expected if no LFS changes)"
          fi
          
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Install Dependencies
        run: |
          bun install --frozen-lockfile
          cd functions && bun install --frozen-lockfile && cd ..
          
      - name: Validate Required Environment Variables
        run: |
          missing=0
          required_vars=(
            PRODUCTION API_KEY AUTH_DOMAIN DATABASE_URL PROJECT_ID STORAGE_BUCKET
            MESSAGING_SENDER_ID APP_ID RECAPTCHA_KEY ANTHROPIC_API_KEY CRAWL4AI_API_KEY
            OPENAI_API_KEY GROQ_API_KEY GOOGLE_API_KEY JINAAI_API_KEY UPSTASH_REDIS_REST_URL
            UPSTASH_REDIS_REST_PORT UPSTASH_REDIS_REST_USER UPSTASH_REDIS_REST_PASSWORD
            UPSTASH_REDIS_REST_TOKEN API_CRAWL4AI_URL API_ARACHNEFLY_URL 
            STRIPE_PUBLIC_KEY GCP_PROJECT_ID MEASUREMENT_ID COOKIE_SECRET CSRF_COOKIE_SECRET
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required env: $var_name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          PRODUCTION: true
          EMULATORS: "false"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
          STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_PORT: ${{ vars.UPSTASH_REDIS_REST_PORT }}
          UPSTASH_REDIS_REST_USER: ${{ secrets.UPSTASH_REDIS_REST_USER }}
          UPSTASH_REDIS_REST_PASSWORD: ${{ secrets.UPSTASH_REDIS_REST_PASSWORD }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          CSRF_COOKIE_SECRET: ${{ secrets.CSRF_COOKIE_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
          AUTH_DOMAIN: ${{ secrets.AUTH_DOMAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          MESSAGING_SENDER_ID: ${{ secrets.MESSAGING_SENDER_ID }}
          APP_ID: ${{ secrets.APP_ID }}
          RECAPTCHA_KEY: ${{ secrets.RECAPTCHA_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRAWL4AI_API_KEY: ${{ secrets.CRAWL4AI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          JINAAI_API_KEY: ${{ secrets.JINAAI_API_KEY }}
          API_CRAWL4AI_URL: ${{ vars.API_CRAWL4AI_URL }}
          API_ARACHNEFLY_URL: ${{ vars.API_ARACHNEFLY_URL }}
      # Build Angular App in production mode
      - name: Build Angular App
        if: needs.detect_changes.outputs.angular == 'true'
        run: bun run build
        env:
          PRODUCTION: true
          EMULATORS: "false"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
          STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_PORT: ${{ vars.UPSTASH_REDIS_REST_PORT }}
          UPSTASH_REDIS_REST_USER: ${{ secrets.UPSTASH_REDIS_REST_USER }}
          UPSTASH_REDIS_REST_PASSWORD: ${{ secrets.UPSTASH_REDIS_REST_PASSWORD }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          CSRF_COOKIE_SECRET: ${{ secrets.CSRF_COOKIE_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
          AUTH_DOMAIN: ${{ secrets.AUTH_DOMAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          MESSAGING_SENDER_ID: ${{ secrets.MESSAGING_SENDER_ID }}
          APP_ID: ${{ secrets.APP_ID }}
          RECAPTCHA_KEY: ${{ secrets.RECAPTCHA_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRAWL4AI_API_KEY: ${{ secrets.CRAWL4AI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          JINAAI_API_KEY: ${{ secrets.JINAAI_API_KEY }}
          API_CRAWL4AI_URL: ${{ vars.API_CRAWL4AI_URL }}
          API_ARACHNEFLY_URL: ${{ vars.API_ARACHNEFLY_URL }}

      # Build Firebase Functions in production mode
      - name: Build Firebase Functions
        if: needs.detect_changes.outputs.functions == 'true'
        working-directory: ./functions
        run: bun run build

      # Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        if: needs.detect_changes.outputs.angular == 'true' || needs.detect_changes.outputs.functions == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ env.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: "."
          expires: "never"
        env:
          PRODUCTION: true
          EMULATORS: "false"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
          STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_PORT: ${{ vars.UPSTASH_REDIS_REST_PORT }}
          UPSTASH_REDIS_REST_USER: ${{ secrets.UPSTASH_REDIS_REST_USER }}
          UPSTASH_REDIS_REST_PASSWORD: ${{ secrets.UPSTASH_REDIS_REST_PASSWORD }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          CSRF_COOKIE_SECRET: ${{ secrets.CSRF_COOKIE_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          JINAAI_API_KEY: ${{ secrets.JINAAI_API_KEY }}
          API_CRAWL4AI_URL: ${{ vars.API_CRAWL4AI_URL }}
          API_ARACHNEFLY_URL: ${{ vars.API_ARACHNEFLY_URL }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Check if BIN file checksum changed (only run if LFS files changed)
      - name: Check BIN Checksum Change
        id: bin_check
        if: needs.detect_changes.outputs.lfs == 'true'
        run: |
          set -euo pipefail
          
          BIN_PATH=""
          if [ -f "functions/databases/IP2LOCATION-LITE-DB11.BIN" ]; then
            BIN_PATH="functions/databases/IP2LOCATION-LITE-DB11.BIN"
          elif [ -f "databases/IP2LOCATION-LITE-DB11.BIN" ]; then
            BIN_PATH="databases/IP2LOCATION-LITE-DB11.BIN"
          fi
          
          if [ -z "$BIN_PATH" ]; then
            echo "skip_upload=true" >> $GITHUB_OUTPUT
          else
            NEW_SHA=$(sha256sum "$BIN_PATH" | awk '{print tolower($1)}')
            CURRENT_SHA=$(gcloud secrets versions access latest \
              --secret="FUNCTIONS_ENV_JSON" \
              --project="${FIREBASE_PROJECT_ID}" 2>/dev/null | jq -r '.IP2LOCATION_SHA256 // empty' || echo "")
            
            if [ "$NEW_SHA" != "$CURRENT_SHA" ]; then
              echo "skip_upload=false" >> $GITHUB_OUTPUT
            else
              echo "skip_upload=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Publish IP2Location BIN and update FUNCTIONS_ENV_JSON
        if: needs.detect_changes.outputs.lfs != 'true' || steps.bin_check.outputs.skip_upload == 'false'
        run: |
          set -euo pipefail

          BIN_PATH=""
          if [ -f "functions/databases/IP2LOCATION-LITE-DB11.BIN" ]; then
            BIN_PATH="functions/databases/IP2LOCATION-LITE-DB11.BIN"
          elif [ -f "databases/IP2LOCATION-LITE-DB11.BIN" ]; then
            BIN_PATH="databases/IP2LOCATION-LITE-DB11.BIN"
          elif [ -f "IP2LOCATION-LITE-DB11.BIN" ]; then
            BIN_PATH="IP2LOCATION-LITE-DB11.BIN"
          fi

          if [ -z "$BIN_PATH" ]; then
            echo "IP2LOCATION-LITE-DB11.BIN not found" >&2
            exit 1
          fi

          BIN_SHA256=$(sha256sum "$BIN_PATH" | awk '{print tolower($1)}')

          gcloud storage cp "$BIN_PATH" "$IP2LOCATION_GCS_PATH" \
            --project="$FIREBASE_PROJECT_ID"

          CURRENT_JSON=$(gcloud secrets versions access latest \
            --secret="FUNCTIONS_ENV_JSON" \
            --project="$FIREBASE_PROJECT_ID")

          UPDATED_JSON=$(printf '%s' "$CURRENT_JSON" | jq -c \
            --arg gcsPath "$IP2LOCATION_GCS_PATH" \
            --arg sha "$BIN_SHA256" \
            '.IP2LOCATION_GCS_PATH=$gcsPath | .IP2LOCATION_SHA256=$sha')

          printf '%s' "$UPDATED_JSON" | gcloud secrets versions add "FUNCTIONS_ENV_JSON" \
            --project="$FIREBASE_PROJECT_ID" \
            --data-file=-

          echo "Published BIN and rotated FUNCTIONS_ENV_JSON with latest checksum"

      - name: Prepare functions .env for deploy analysis
        run: |
          cat > functions/.env <<EOF
          PRODUCTION=true
          API_CRAWL4AI_URL=${API_CRAWL4AI_URL}
          API_ARACHNEFLY_URL=${API_ARACHNEFLY_URL}
          UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
          UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
          UPSTASH_REDIS_REST_PORT=${UPSTASH_REDIS_REST_PORT}
          UPSTASH_REDIS_REST_USER=${UPSTASH_REDIS_REST_USER}
          UPSTASH_REDIS_REST_PASSWORD=${UPSTASH_REDIS_REST_PASSWORD}
          COOKIE_SECRET=${COOKIE_SECRET}
          CSRF_COOKIE_SECRET=${CSRF_COOKIE_SECRET}
          GCP_PROJECT_ID=${GCP_PROJECT_ID}
          EOF
        env:
          API_CRAWL4AI_URL: ${{ vars.API_CRAWL4AI_URL }}
          API_ARACHNEFLY_URL: ${{ vars.API_ARACHNEFLY_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          UPSTASH_REDIS_REST_PORT: ${{ vars.UPSTASH_REDIS_REST_PORT }}
          UPSTASH_REDIS_REST_USER: ${{ secrets.UPSTASH_REDIS_REST_USER }}
          UPSTASH_REDIS_REST_PASSWORD: ${{ secrets.UPSTASH_REDIS_REST_PASSWORD }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          CSRF_COOKIE_SECRET: ${{ secrets.CSRF_COOKIE_SECRET }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: Verify Firebase Extensions access
        run: npx firebase-tools ext:list --project ${{ env.FIREBASE_PROJECT_ID }} --json

      - name: Deploy Firebase Functions
        working-directory: ./functions
        run: npx firebase-tools deploy --only functions --project ${{ env.FIREBASE_PROJECT_ID }} --force
        env:
          PRODUCTION: true
          API_CRAWL4AI_URL: ${{ vars.API_CRAWL4AI_URL }}
          API_ARACHNEFLY_URL: ${{ vars.API_ARACHNEFLY_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JINAAI_API_KEY: ${{ secrets.JINAAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}
          STRIPE_PRICE_STARTER_PAYG: ${{ vars.STRIPE_PRICE_STARTER_PAYG }}
          STRIPE_PRICE_STARTER_MONTHLY: ${{ vars.STRIPE_PRICE_STARTER_MONTHLY }}
          STRIPE_PRICE_STARTER_QUARTERLY: ${{ vars.STRIPE_PRICE_STARTER_QUARTERLY }}
          STRIPE_PRICE_STARTER_ANNUAL: ${{ vars.STRIPE_PRICE_STARTER_ANNUAL }}
          STRIPE_PRICE_PRO_PAYG: ${{ vars.STRIPE_PRICE_PRO_PAYG }}
          STRIPE_PRICE_PRO_MONTHLY: ${{ vars.STRIPE_PRICE_PRO_MONTHLY }}
          STRIPE_PRICE_PRO_QUARTERLY: ${{ vars.STRIPE_PRICE_PRO_QUARTERLY }}
          STRIPE_PRICE_PRO_ANNUAL: ${{ vars.STRIPE_PRICE_PRO_ANNUAL }}
          STRIPE_PRICE_ENTERPRISE_MONTHLY: ${{ vars.STRIPE_PRICE_ENTERPRISE_MONTHLY }}
          STRIPE_PRICE_ENTERPRISE_QUARTERLY: ${{ vars.STRIPE_PRICE_ENTERPRISE_QUARTERLY }}
          STRIPE_PRICE_ENTERPRISE_ANNUAL: ${{ vars.STRIPE_PRICE_ENTERPRISE_ANNUAL }}
          STRIPE_PRICE_CREDITS_100: ${{ vars.STRIPE_PRICE_CREDITS_100 }}
          STRIPE_PRICE_CREDITS_500: ${{ vars.STRIPE_PRICE_CREDITS_500 }}
          STRIPE_PRICE_CREDITS_2000: ${{ vars.STRIPE_PRICE_CREDITS_2000 }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_PORT: ${{ vars.UPSTASH_REDIS_REST_PORT }}
          UPSTASH_REDIS_REST_USER: ${{ secrets.UPSTASH_REDIS_REST_USER }}
          UPSTASH_REDIS_REST_PASSWORD: ${{ secrets.UPSTASH_REDIS_REST_PASSWORD }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          CSRF_COOKIE_SECRET: ${{ secrets.CSRF_COOKIE_SECRET }}


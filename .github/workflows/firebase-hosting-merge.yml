name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.changes.outputs.functions }}
      angular: ${{ steps.changes.outputs.angular }}
      hosting: ${{ steps.changes.outputs.hosting }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            functions:
              - 'functions/**'
            angular:
              - 'src/**'
            hosting:
              - 'firebase.json'
              - 'angular.json'
              - 'package.json'
              - 'bun.lockb'
              - 'dist/**'

  build_and_deploy:
    needs: detect_changes
    runs-on: ubuntu-latest
    env:
      DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
      FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      IP2LOCATION_GCS_PATH: ${{ vars.IP2LOCATION_GCS_PATH }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.x"

      - name: Configure Firebase CLI authentication
        run: |
          credentials_path="$RUNNER_TEMP/firebase-service-account.json"
          cat <<'EOF' > "$credentials_path"
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF
          echo "GOOGLE_APPLICATION_CREDENTIALS=$credentials_path" >> "$GITHUB_ENV"
          echo "GOOGLE_CLOUD_PROJECT=${FIREBASE_PROJECT_ID}" >> "$GITHUB_ENV"
          echo "GCLOUD_PROJECT=${FIREBASE_PROJECT_ID}" >> "$GITHUB_ENV"

      - name: Install npm 11.11.x
        run: npm install -g npm@11.11.x

      - name: Install Dependencies
        run: |
          bun install --frozen-lockfile
          cd functions && bun install --frozen-lockfile && cd ..
          
      - name: Validate Required Environment Variables
        run: |
          missing=0
          required_vars=(
            PRODUCTION API_KEY AUTH_DOMAIN DATABASE_URL PROJECT_ID STORAGE_BUCKET
            MESSAGING_SENDER_ID APP_ID RECAPTCHA_KEY ANTHROPIC_API_KEY CRAWL4AI_API_KEY
            OPENAI_API_KEY GROQ_API_KEY GOOGLE_API_KEY JINAAI_API_KEY UPSTASH_REDIS_REST_URL
            UPSTASH_REDIS_REST_PORT UPSTASH_REDIS_REST_USER UPSTASH_REDIS_REST_PASSWORD
            UPSTASH_REDIS_REST_TOKEN API_CRAWL4AI_URL API_ARACHNEFLY_URL 
            STRIPE_PUBLIC_KEY GCP_PROJECT_ID MEASUREMENT_ID COOKIE_SECRET CSRF_COOKIE_SECRET
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required env: $var_name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          PRODUCTION: true
          EMULATORS: "false"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
          STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_PORT: ${{ vars.UPSTASH_REDIS_REST_PORT }}
          UPSTASH_REDIS_REST_USER: ${{ secrets.UPSTASH_REDIS_REST_USER }}
          UPSTASH_REDIS_REST_PASSWORD: ${{ secrets.UPSTASH_REDIS_REST_PASSWORD }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          CSRF_COOKIE_SECRET: ${{ secrets.CSRF_COOKIE_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
          AUTH_DOMAIN: ${{ secrets.AUTH_DOMAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          MESSAGING_SENDER_ID: ${{ secrets.MESSAGING_SENDER_ID }}
          APP_ID: ${{ secrets.APP_ID }}
          RECAPTCHA_KEY: ${{ secrets.RECAPTCHA_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRAWL4AI_API_KEY: ${{ secrets.CRAWL4AI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          JINAAI_API_KEY: ${{ secrets.JINAAI_API_KEY }}
          API_CRAWL4AI_URL: ${{ vars.API_CRAWL4AI_URL }}
          API_ARACHNEFLY_URL: ${{ vars.API_ARACHNEFLY_URL }}
      # Build Angular App in production mode
      - name: Build Angular App
        if: needs.detect_changes.outputs.angular == 'true' || needs.detect_changes.outputs.hosting == 'true'
        run: bun run build
        env:
          PRODUCTION: true
          EMULATORS: "false"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
          STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_PORT: ${{ vars.UPSTASH_REDIS_REST_PORT }}
          UPSTASH_REDIS_REST_USER: ${{ secrets.UPSTASH_REDIS_REST_USER }}
          UPSTASH_REDIS_REST_PASSWORD: ${{ secrets.UPSTASH_REDIS_REST_PASSWORD }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          CSRF_COOKIE_SECRET: ${{ secrets.CSRF_COOKIE_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
          AUTH_DOMAIN: ${{ secrets.AUTH_DOMAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          MESSAGING_SENDER_ID: ${{ secrets.MESSAGING_SENDER_ID }}
          APP_ID: ${{ secrets.APP_ID }}
          RECAPTCHA_KEY: ${{ secrets.RECAPTCHA_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRAWL4AI_API_KEY: ${{ secrets.CRAWL4AI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          JINAAI_API_KEY: ${{ secrets.JINAAI_API_KEY }}
          API_CRAWL4AI_URL: ${{ vars.API_CRAWL4AI_URL }}
          API_ARACHNEFLY_URL: ${{ vars.API_ARACHNEFLY_URL }}

      # Build Firebase Functions in production mode
      - name: Build Firebase Functions
        if: needs.detect_changes.outputs.functions == 'true'
        working-directory: ./functions
        run: bun run build

      # Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        if: needs.detect_changes.outputs.angular == 'true' || needs.detect_changes.outputs.hosting == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ env.FIREBASE_PROJECT_ID }}
          channelId: live
          entryPoint: "."
          expires: "never"
        env:
          PRODUCTION: true
          EMULATORS: "false"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          MEASUREMENT_ID: ${{ vars.MEASUREMENT_ID }}
          STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_PORT: ${{ vars.UPSTASH_REDIS_REST_PORT }}
          UPSTASH_REDIS_REST_USER: ${{ secrets.UPSTASH_REDIS_REST_USER }}
          UPSTASH_REDIS_REST_PASSWORD: ${{ secrets.UPSTASH_REDIS_REST_PASSWORD }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          CSRF_COOKIE_SECRET: ${{ secrets.CSRF_COOKIE_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          JINAAI_API_KEY: ${{ secrets.JINAAI_API_KEY }}
          API_CRAWL4AI_URL: ${{ vars.API_CRAWL4AI_URL }}
          API_ARACHNEFLY_URL: ${{ vars.API_ARACHNEFLY_URL }}

      - name: Prepare functions .env for deploy analysis
        run: |
          cat > functions/.env <<EOF
          PRODUCTION=true
          API_CRAWL4AI_URL=${API_CRAWL4AI_URL}
          API_ARACHNEFLY_URL=${API_ARACHNEFLY_URL}
          UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
          UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
          UPSTASH_REDIS_REST_PORT=${UPSTASH_REDIS_REST_PORT}
          UPSTASH_REDIS_REST_USER=${UPSTASH_REDIS_REST_USER}
          UPSTASH_REDIS_REST_PASSWORD=${UPSTASH_REDIS_REST_PASSWORD}
          COOKIE_SECRET=${COOKIE_SECRET}
          CSRF_COOKIE_SECRET=${CSRF_COOKIE_SECRET}
          GCP_PROJECT_ID=${GCP_PROJECT_ID}
          IP2LOCATION_GCS_PATH=${IP2LOCATION_GCS_PATH}
          EOF
        env:
          API_CRAWL4AI_URL: ${{ vars.API_CRAWL4AI_URL }}
          API_ARACHNEFLY_URL: ${{ vars.API_ARACHNEFLY_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          UPSTASH_REDIS_REST_PORT: ${{ vars.UPSTASH_REDIS_REST_PORT }}
          UPSTASH_REDIS_REST_USER: ${{ secrets.UPSTASH_REDIS_REST_USER }}
          UPSTASH_REDIS_REST_PASSWORD: ${{ secrets.UPSTASH_REDIS_REST_PASSWORD }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          CSRF_COOKIE_SECRET: ${{ secrets.CSRF_COOKIE_SECRET }}
          IP2LOCATION_GCS_PATH: ${{ vars.IP2LOCATION_GCS_PATH }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: Verify Firebase Extensions access
        run: npx firebase-tools ext:list --project ${{ env.FIREBASE_PROJECT_ID }} --json

      - name: Deploy Firebase Functions
        working-directory: ./functions
        if: needs.detect_changes.outputs.functions == 'true'
        run: npx firebase-tools deploy --only functions --project ${{ env.FIREBASE_PROJECT_ID }} --force
        env:
          PRODUCTION: true
          API_CRAWL4AI_URL: ${{ vars.API_CRAWL4AI_URL }}
          API_ARACHNEFLY_URL: ${{ vars.API_ARACHNEFLY_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JINAAI_API_KEY: ${{ secrets.JINAAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          STRIPE_PUBLIC_KEY: ${{ secrets.STRIPE_PUBLIC_KEY }}
          STRIPE_PRICE_STARTER_PAYG: ${{ vars.STRIPE_PRICE_STARTER_PAYG }}
          STRIPE_PRICE_STARTER_MONTHLY: ${{ vars.STRIPE_PRICE_STARTER_MONTHLY }}

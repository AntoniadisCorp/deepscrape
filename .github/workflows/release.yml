name: Release

on:
  push:
    branches:
      - main
      - next

jobs:
  release:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v5
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm clean-install

      - name: Set up Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx semantic-release

      - name: Update package.json version
        id: update_version
        run: |
          NEW_TAG=$(git tag --points-at HEAD --sort=-version:refname | head -n1)
          if [ -z "$NEW_TAG" ]; then
            echo "No new tag found for HEAD, skipping package.json bump."
            exit 0
          fi
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          NEW_VERSION=${NEW_TAG#v}
          echo "Bumping package.json to $NEW_VERSION"
          npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version

      - name: Delete stale release assets branch
        if: steps.update_version.outputs.new_tag != ''
        run: |
          git push origin --delete "chore/release-assets-${{ github.ref_name }}" || true

      - name: Create Pull Request for Release Assets
        if: steps.update_version.outputs.new_tag != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "chore/release-assets-${{ github.ref_name }}"
          base: ${{ github.ref_name }}
          commit-message: "chore: update changelog and package version [skip ci]"
          title: "chore: release assets for ${{ github.ref_name }}"
          body: |
            Automated PR updating release assets after semantic-release.

            - Updated `CHANGELOG.md` with release notes
            - Bumped `package.json` version to match the new tag
          labels: release
          add-paths: |
            CHANGELOG.md
            package.json
<div
  appRipple
  ripplColor="light"
  (click)="toggleTheme()"
  class="flex flex-col items-center cursor-pointer justify-center border-none text-center bg-transparent hover:bg-[#3939393b] dark:hover:bg-gray-700/30 p-2 rounded-full transition-colors">
  <button
    type="button"
    class="flex items-center justify-center p-0 m-0 border-none bg-transparent"
    [title]="getToggleLabel()"
    [attr.aria-label]="getToggleLabel()">
    <mat-icon
      [style]="getIconColorClass()"
      class="!text-[var(--icon-color)] dark:!text-[var(--icon-color-dark)]">
      {{ isDark ? 'light' : 'dark' }}_mode
    </mat-icon>
  </button>
</div>

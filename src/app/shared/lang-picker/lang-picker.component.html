<div
  appRipple
  ripplColor="light"
  [matMenuTriggerFor]="languageMenu"
  (click)="openLanguageMenu($event, langMenuTrigger)"
  #langMenuTrigger="matMenuTrigger"
  class="flex group flex-col items-center cursor-pointer justify-center border-none text-center bg-transparent hover:bg-[#3939393b] dark:hover:bg-gray-700/30 p-2 rounded-full transition-colors">
  <button
    type="button"
    class="flex items-center justify-center p-0 m-0 border-none bg-transparent"
    [title]="'Select Language'"
    [attr.aria-label]="'Select Language'">
    <mat-icon
      [style]="getIconColorClass()"
      class="text-[var(--icon-color)] dark:text-[var(--icon-color-dark)] group-hover:text-[var(--icon-hover-color)] dark:group-hover:text-[var(--icon-hover-color-dark)] transition-colors">
      language
    </mat-icon>
    <span class="ml-2 font-bold text-gray-800 dark:text-gray-200">{{ currentLang().toUpperCase() }}</span>
  </button>
</div>

<mat-menu #languageMenu="matMenu">
  @for (lang of availableLangs; track lang.code) {
    <button mat-menu-item (click)="changeLanguage(lang.code)">
      <span>{{ lang.display }}</span>
    </button>
  }
</mat-menu>

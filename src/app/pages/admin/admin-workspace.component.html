<div class="admin-workspace-shell mt-8 min-h-screen rounded-md p-4 sm:p-6 lg:p-8 bg-gray-100 dark:bg-gray-900">
  <header class="mb-6">
    <h1 class="text-2xl sm:text-3xl font-bold text-gray6 dark:text-gray3">Admin Console</h1>
    <p class="text-sm text-gray6/70 dark:text-gray-300 mt-1">Analytics and migration tools</p>
  </header>

  <div
    class="sticky scrollbar-hidden snap-x overflow-auto z-50 flex h-16 flex-nowrap items-center justify-start gap-1 border-b bg-gray-200 text-base text-gray-800 dark:border-b-[#64b5f633] dark:bg-gray-900 mb-6"
  >
    <a
      *ngFor="let tab of tabs"
      [routerLink]="tab.route"
      routerLinkActive="active"
      #rla="routerLinkActive"
      [ngClass]="rla.isActive ? 'bg-gray-300/70 transition dark:border-blue-300 dark:bg-gray5/40' : ''"
      class="flex snap-normal h-full w-full max-w-[10rem] flex-shrink-0 items-center justify-center rounded-sm rounded-tl-lg rounded-tr-lg border-b-2 border-transparent px-3 py-3 text-gray-900 transition-all hover:border-blue-300 hover:bg-cyan-100 hover:duration-100 hover:ease-in-out dark:text-gray-400 dark:hover:bg-cyan-300/10 dark:hover:text-gray-200"
      [routerLinkActiveOptions]="{ exact: true }">
      <span>{{ tab.label }}</span>
    </a>
  </div>

  <router-outlet></router-outlet>
</div>

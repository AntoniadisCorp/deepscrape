<div class="mx-auto mt-8 w-full">
  <div class="flex items-center flex-col relative">
    <ng-container *ngIf="currentMode as mode">
      <div
        [@routeChildAnimation]="mode"
        class="flex max-w-3xl w-full flex-col mt-4 lg:mt-0">
        <div 
          class="relative rounded-lg overflow-hidden dark:bg-gray6 bg-gray-200 shadow-md">
          <div 
            #modeScrollContainer
            class="overflow-x-hidden scrollbar-thin overscroll-contain touch-pan-x py-2 px-2"
            appHiddenDragScroll
            (scroll)="onModeScroll($event)">
            <div class="flex gap-3 whitespace-nowrap min-w-max cursor-grab active:cursor-grabbing">
              <ng-container *ngFor="let mode of ['llm-scrape', 'crawl', 'seeder']">
                <button
                  class="group py-2 px-3 text-base font-normal text-center transition-all duration-100 ease-in-out rounded-lg focus:outline-none"
                  [ngClass]="{
                    'text-blue-600 dark:text-blue-400 shadow-md shadow-gray-300 dark:shadow-blue-400 bg-blue-50/50 dark:bg-gray-800/50 ':
                      currentMode === mode,
                    'text-gray-600 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 hover:bg-gray-100 dark:hover:bg-gray-800':
                      currentMode !== mode
                  }"
                  (click)="changeMode(mode)">
                  {{ mode === 'llm-scrape' ? 'LLM Scrape' : (mode === 'crawl' ? 'Crawl' : 'Seeder') }}
                  <span
                    [ngClass]="{
                      'dark:text-gray2': currentMode == mode
                    }"
                    class="text-sm text-gray-400  group-hover:text-pink-100 dark:group-hover:text-gray2 font-semibold">
                    /{{ mode }}
                  </span>
                </button>
              </ng-container>
            </div>
          </div>
        </div>        <!-- Use [@fadeinCartItems] on each child component container to animate transitions -->
        <div *ngIf="currentMode === 'llm-scrape'" class="w-full">
          <app-llm-scrape></app-llm-scrape>
        </div>
        <div *ngIf="currentMode === 'crawl'" class="w-full">
          <app-crawl></app-crawl>
        </div>
        <div *ngIf="currentMode === 'seeder'" class="w-full">
          <app-domain-seeder></app-domain-seeder>
        </div>
      </div>
    </ng-container>
  </div>
</div>

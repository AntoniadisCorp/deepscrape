<div class="container mx-auto mt-5">
  <h1 class="text-2xl font-semibold mb-5">Payment Methods</h1>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label for="cardNumber" class="block text-sm font-medium text-gray-700">Card Number</label>
      <input type="text" name="cardNumber" id="cardNumber" class="mt-1 focus:ring-indigo-500 focus:border-indigo-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
    </div>
    <div>
      <label for="expiryDate" class="block text-sm font-medium text-gray-700">Expiry Date</label>
      <input type="text" name="expiryDate" id="expiryDate" class="mt-1 focus:ring-indigo-500 focus:border-indigo-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
    </div>
    <div>
      <label for="cvv" class="block text-sm font-medium text-gray-700">CVV</label>
      <input type="text" name="cvv" id="cvv" class="mt-1 focus:ring-indigo-500 focus:border-indigo-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
    </div>
    <div>
      <label for="billingAddress" class="block text-sm font-medium text-gray-700">Billing Address</label>
      <textarea name="billingAddress" id="billingAddress" rows="3" class="mt-1 focus:ring-indigo-500 focus:border-indigo-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md"></textarea>
    </div>
  </div>
  <div class="mt-5">
    <button type="submit" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
      Add Card
    </button>
  </div>
</div>

<section class="container mx-auto px-4 py-10 max-w-3xl" *ngIf="isVerifiedSession">
  <div class="rounded-2xl bg-gray-100 dark:bg-gray6 shadow-lg p-8 border border-emerald-500/30">
    <h1 class="text-3xl font-semibold text-gray-800 dark:text-gray-100">Payment successful</h1>
    <p class="mt-3 text-gray-600 dark:text-gray-300">
      Your billing update is complete. Entitlements and credits should be available shortly.
    </p>

    <div class="mt-6 flex flex-wrap gap-3">
      <a
        class="px-5 py-2 rounded-full bg-violet-600 text-gray1 dark:text-gray-100 hover:bg-violet-700 transition-colors"
        [routerLink]="['/billing/plans']"
      >
        Back to plans
      </a>

      <a
        *ngIf="returnUrl"
        class="px-5 py-2 rounded-full bg-gray-300 dark:bg-gray-800 text-gray-800 dark:text-gray-100 hover:bg-gray-400 dark:hover:bg-gray-700 transition-colors"
        [routerLink]="returnUrl"
      >
        Return to previous page
      </a>
    </div>
  </div>
</section>

<section class="container mx-auto px-4 py-10 max-w-3xl" *ngIf="shouldShowCancelPage">
  <div class="rounded-2xl bg-gray-100 dark:bg-gray6 shadow-lg p-8 border border-orange-500/30">
    <h1 class="text-3xl font-semibold text-gray-800 dark:text-gray-100">Checkout cancelled</h1>
    <p class="mt-3 text-gray-600 dark:text-gray-300">
      No payment was processed. You can review plans or try checkout again when ready.
    </p>

    <div class="mt-6">
      <a
        class="px-5 py-2 rounded-full bg-violet-600 text-gray1 dark:text-gray-100 hover:bg-violet-700 transition-colors"
        [routerLink]="['/billing/plans']"
      >
        Back to plans
      </a>
    </div>
  </div>
</section>

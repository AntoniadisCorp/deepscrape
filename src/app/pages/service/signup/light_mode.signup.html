 <head>

  <style>
      body {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }

      /* Custom focus ring for accessibility */
      .cc-focus-ring:focus-visible {
        outline: 2px solid rgba(79, 70, 229, 0.9);
        outline-offset: 2px;
      }

      /* Animated background elements */
      .bg-illustration {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .crawler-bot {
        position: absolute;
        opacity: 0.15;
        animation: float 20s ease-in-out infinite;
      }

      .data-node {
        position: absolute;
        width: 8px;
        height: 8px;
        background: rgba(99, 102, 241, 0.4);
        border-radius: 50%;
        animation: pulse 3s ease-in-out infinite;
      }

      .connection-line {
        position: absolute;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.3), transparent);
        transform-origin: left center;
        animation: scan 4s linear infinite;
      }

      @keyframes float {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        25% { transform: translate(20px, -20px) rotate(5deg); }
        50% { transform: translate(-10px, 10px) rotate(-5deg); }
        75% { transform: translate(15px, 5px) rotate(3deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.5); }
      }

      @keyframes scan {
        0% { transform: scaleX(0); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: scaleX(1); opacity: 0; }
      }

      /* Enhanced input transitions */
      .cc-input {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .cc-input:hover {
        border-color: rgba(99, 102, 241, 0.4);
        background-color: rgba(255, 255, 255, 0.9);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
      }

      .cc-input:focus {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(99, 102, 241, 0.15);
      }

      /* Button hover effects */
      #signup-button {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }

      #signup-button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
      }

      #signup-button:hover::before {
        width: 300px;
        height: 300px;
      }

      #signup-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 30px rgba(99, 102, 241, 0.4);
      }

      #signup-button:active {
        transform: translateY(0);
      }

      /* Card entrance animation */
      main section {
        animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Label transitions */
      label {
        transition: color 0.2s ease;
      }

      .cc-input:focus + label,
      .cc-input:hover + label {
        color: #6366f1;
      }
    </style>
  <style>@view-transition { navigation: auto; }</style>

  <script>
      // ------- CONFIG & ELEMENT SDK SETUP -------

      const defaultConfig = {
        page_title: "Create your account",
        page_subtitle: "Join us in just a few steps. It only takes a moment.",
        name_label: "Full name",
        email_label: "Email address",
        phone_label: "Phone number (optional)",
        password_label: "Create password",
        confirm_password_label: "Confirm password",
        signup_button_text: "Create account",
        footer_text: "Already have an account?",
        footer_link_text: "Log in",
        // Colors (5 total, used via Tailwind-compatible values)
        background_color: "#ffffff", // Not directly recolored; gradient kept as requested
        surface_color: "#ffffff",
        text_color: "#020617",
        primary_action_color: "#6366f1",
        secondary_action_color: "#4b5563",
        font_family: "system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
        font_size: 16
      };

      // Cache key elements for config-driven updates
      const elTitle = document.getElementById("signup-title");
      const elSubtitle = document.getElementById("signup-subtitle");
      const elLabelName = document.getElementById("label-name");
      const elLabelEmail = document.getElementById("label-email");
      const elLabelPhone = document.getElementById("label-phone");
      const elLabelPassword = document.getElementById("label-password");
      const elLabelConfirmPassword = document.getElementById(
        "label-confirm-password"
      );
      const elButton = document.getElementById("signup-button");
      const elButtonText = document.getElementById("signup-button-text");
      const elFooterMain = document.getElementById("footer-main-text");
      const elFooterLink = document.getElementById("footer-link");
      const cardSection = document.querySelector("main section");
      const bodyEl = document.body;
      const allTextNodesSelector =
        "h1,h2,h3,h4,h5,h6,p,button,label,input,small,span,div,footer";

      function applyConfigToUI(config) {
        const cfg = config || defaultConfig;
        const baseSize = cfg.font_size || defaultConfig.font_size;
        const fontFamily =
          (cfg.font_family || defaultConfig.font_family) +
          ", system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";

        // Text content
        elTitle.textContent = cfg.page_title || defaultConfig.page_title;
        elSubtitle.textContent =
          cfg.page_subtitle || defaultConfig.page_subtitle;
        elLabelName.textContent = cfg.name_label || defaultConfig.name_label;
        elLabelEmail.textContent = cfg.email_label || defaultConfig.email_label;
        elLabelPhone.textContent = cfg.phone_label || defaultConfig.phone_label;
        elLabelPassword.textContent =
          cfg.password_label || defaultConfig.password_label;
        elLabelConfirmPassword.textContent =
          cfg.confirm_password_label ||
          defaultConfig.confirm_password_label;
        elButtonText.textContent =
          cfg.signup_button_text || defaultConfig.signup_button_text;

        // Footer text + inline link text
        const footerText = cfg.footer_text || defaultConfig.footer_text;
        const footerLinkText =
          cfg.footer_link_text || defaultConfig.footer_link_text;
        elFooterMain.innerHTML =
          `${footerText} ` +
          `<button type="button" id="footer-link" class="font-semibold text-indigo-600 hover:text-indigo-700 underline-offset-2 hover:underline focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 focus-visible:ring-offset-2 focus-visible:ring-offset-white cc-focus-ring">${footerLinkText}</button>`;
        // Re-acquire footer link element after innerHTML update
        const newFooterLink = document.getElementById("footer-link");

        // Colors
        cardSection.style.backgroundColor =
          cfg.surface_color || defaultConfig.surface_color;
        cardSection.style.color = cfg.text_color || defaultConfig.text_color;
        elButton.style.backgroundColor =
          cfg.primary_action_color || defaultConfig.primary_action_color;
        elButton.style.boxShadow =
          "0 10px 25px rgba(99, 102, 241, 0.45)";

        if (newFooterLink) {
          newFooterLink.style.color =
            cfg.secondary_action_color ||
            defaultConfig.secondary_action_color;
        }

        // Circle in icon uses cc-surface-fill class; keep base color consistent with primary action
        const iconCircle = document.querySelector(".cc-surface-fill");
        if (iconCircle) {
          iconCircle.setAttribute(
            "fill",
            cfg.primary_action_color || defaultConfig.primary_action_color
          );
        }

        // Font family + sizing applied proportionally
        document
          .querySelectorAll(allTextNodesSelector)
          .forEach(function (node) {
            node.style.fontFamily = fontFamily;
          });

        elTitle.style.fontSize = baseSize * 1.75 + "px";
        elSubtitle.style.fontSize = baseSize * 0.9 + "px";
        elButtonText.style.fontSize = baseSize * 0.9 + "px";
        cardSection.style.fontSize = baseSize * 0.9 + "px";

        // Inputs font size
        document.querySelectorAll(".cc-input").forEach(function (input) {
          input.style.fontSize = baseSize * 0.9 + "px";
          input.style.fontFamily = fontFamily;
        });
      }

      // Initialize UI with default config before SDK is ready
      applyConfigToUI(defaultConfig);

      // Initialize Element SDK if available
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig: defaultConfig,
          onConfigChange: async function (config) {
            applyConfigToUI(config);
          },
          mapToCapabilities: function (config) {
            const cfg = config || defaultConfig;

            const recolorables = [
              {
                // Secondary surface (card)
                get: () => cfg.surface_color || defaultConfig.surface_color,
                set: (value) => {
                  cfg.surface_color = value;
                  window.elementSdk.setConfig({ surface_color: value });
                }
              },
              {
                // Text color
                get: () => cfg.text_color || defaultConfig.text_color,
                set: (value) => {
                  cfg.text_color = value;
                  window.elementSdk.setConfig({ text_color: value });
                }
              },
              {
                // Primary action (main button + icon)
                get: () =>
                  cfg.primary_action_color ||
                  defaultConfig.primary_action_color,
                set: (value) => {
                  cfg.primary_action_color = value;
                  window.elementSdk.setConfig({
                    primary_action_color: value
                  });
                }
              },
              {
                // Secondary action (footer link)
                get: () =>
                  cfg.secondary_action_color ||
                  defaultConfig.secondary_action_color,
                set: (value) => {
                  cfg.secondary_action_color = value;
                  window.elementSdk.setConfig({
                    secondary_action_color: value
                  });
                }
              },
              {
                // Background base color (not overriding gradient but available)
                get: () =>
                  cfg.background_color || defaultConfig.background_color,
                set: (value) => {
                  cfg.background_color = value;
                  window.elementSdk.setConfig({ background_color: value });
                }
              }
            ];

            const fontEditable = {
              get: () => cfg.font_family || defaultConfig.font_family,
              set: (value) => {
                cfg.font_family = value;
                window.elementSdk.setConfig({ font_family: value });
              }
            };

            const fontSizeable = {
              get: () => cfg.font_size || defaultConfig.font_size,
              set: (value) => {
                cfg.font_size = value;
                window.elementSdk.setConfig({ font_size: value });
              }
            };

            return {
              recolorables: recolorables,
              borderables: [],
              fontEditable: fontEditable,
              fontSizeable: fontSizeable
            };
          },
          mapToEditPanelValues: function (config) {
            const cfg = config || defaultConfig;
            return new Map([
              ["page_title", cfg.page_title || defaultConfig.page_title],
              [
                "page_subtitle",
                cfg.page_subtitle || defaultConfig.page_subtitle
              ],
              ["name_label", cfg.name_label || defaultConfig.name_label],
              ["email_label", cfg.email_label || defaultConfig.email_label],
              ["phone_label", cfg.phone_label || defaultConfig.phone_label],
              [
                "password_label",
                cfg.password_label || defaultConfig.password_label
              ],
              [
                "confirm_password_label",
                cfg.confirm_password_label ||
                  defaultConfig.confirm_password_label
              ],
              [
                "signup_button_text",
                cfg.signup_button_text || defaultConfig.signup_button_text
              ],
              ["footer_text", cfg.footer_text || defaultConfig.footer_text],
              [
                "footer_link_text",
                cfg.footer_link_text || defaultConfig.footer_link_text
              ]
            ]);
          }
        });
      }

      // ------- SIMPLE FORM HANDLING (FRONTEND ONLY) -------

      const form = document.getElementById("signup-form");
      const statusEl = document.getElementById("form-status");
      const button = document.getElementById("signup-button");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const name = document.getElementById("full_name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirm_password").value;

        // Basic validation
        if (!name || !email || !password || !confirmPassword) {
          statusEl.textContent = "Please fill in all fields.";
          return;
        }

        if (password.length < 8) {
          statusEl.textContent =
            "Password should be at least 8 characters.";
          return;
        }

        if (password !== confirmPassword) {
          statusEl.textContent = "Passwords do not match.";
          return;
        }

        // Simulate success
        statusEl.classList.remove("text-rose-600");
        statusEl.classList.add("text-emerald-700");
        statusEl.textContent = "You’re all set! (Demo only, not submitted.)";

        button.disabled = true;

        setTimeout(function () {
          button.disabled = false;
          statusEl.textContent = "";
          statusEl.classList.remove("text-emerald-700");
          statusEl.classList.add("text-rose-600");
        }, 2500);
      });
    </script>

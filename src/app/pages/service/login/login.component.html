<main class="h-full flex items-center justify-center px-2 py-4 bg-gradient-to-br from-white via-blue-200 to-indigo-400 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 min-h-screen">
  <!-- <app-animated-bg></app-animated-bg> -->
  <!-- Card Container -->
  <section class="w-full max-w-sm bg-white/90 dark:bg-gray-900/90 backdrop-blur-sm shadow-2xl rounded-xl p-4 flex flex-col gap-4 relative z-10 border border-gray-100 dark:border-gray-800 transition-all duration-300">
    <!-- Logo/Icon placeholder -->
    <div class="flex justify-center mb-1">
      <img src="assets/logo-512x512.png" alt="Logo" class="h-9 w-9 rounded-full shadow-md" loading="lazy" />
    
    </div>
    <header class="flex gap-2 mb-2 text-center">
      <div class="w-8 h-8 rounded-xl bg-indigo-500 flex items-center justify-center shadow-md" aria-hidden="true" style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
        <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="10" class="cc-surface-fill" fill="#6366f1"></circle> <path d="M8 13.5L10.5 16L16 8" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </div>
      <div>
        <h1 class="text-xl font-extrabold text-gray-900 dark:text-gray-100 mb-1 tracking-tight">Sign in to your account</h1>
        <p class="text-gray-600 dark:text-gray-300 text-xs">Welcome back! Please enter your credentials.</p>
      </div>
    </header>
    <form [formGroup]="loginForm" (ngSubmit)="login()" autocomplete="off" novalidate class="flex flex-col gap-3">
      <div *ngIf="errorMessage" class="bg-red-100 dark:bg-red-900 border border-red-400 dark:border-red-700 text-red-700 dark:text-red-200 px-2 py-2 rounded-lg relative mb-2 font-semibold flex items-center gap-2 animate-pulse text-xs" role="alert">
        <svg class="w-4 h-4 text-red-500 dark:text-red-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M21 12A9 9 0 1 1 3 12a9 9 0 0 1 18 0Z"/></svg>
        <span class="block sm:inline">{{ errorMessage }}</span>
      </div>
      <!-- Social Login Buttons -->
      <div class="flex gap-2 mb-1">
        <button type="button" [disabled]="loading.github" (click)="loginWithGithub()"
          class="flex-1 flex items-center justify-center gap-2 rounded bg-white dark:bg-gray-800 px-2 py-2 text-xs font-bold text-gray-800 dark:text-gray-200 shadow transition-all duration-150 hover:shadow-md active:bg-gray-100 dark:active:bg-gray-700 outline-none
            hover:bg-gray-50 hover:text-gray-900 dark:hover:bg-gray-700 dark:hover:text-white focus:ring-2 focus:ring-indigo-300 dark:focus:ring-indigo-600">
          <ng-container *ngIf="!loading.github; else githubSpinner">
            <mat-icon aria-label="github" svgIcon="github" class="w-5 h-5 text-gray-700 dark:text-gray-200 transition duration-75 group-hover:text-gray-900 dark:group-hover:text-white"></mat-icon>
            <span>Github</span>
          </ng-container>
          <ng-template #githubSpinner>
            <span class="flex h-6 w-16 items-center justify-center">
              <mat-spinner [diameter]="24" class="stroke-blue-500"></mat-spinner>
            </span>
          </ng-template>
        </button>
        <button type="button" [disabled]="loading.google" (click)="loginWithGoogle()"
          class="flex-1 flex items-center justify-center gap-2 rounded bg-white dark:bg-gray-800 px-2 py-2 text-xs font-bold text-gray-800 dark:text-gray-200 shadow transition-all duration-150 hover:shadow-md active:bg-gray-100 dark:active:bg-gray-700
            hover:bg-gray-50 hover:text-gray-900 dark:hover:bg-gray-700 dark:hover:text-white focus:ring-2 focus:ring-indigo-300 dark:focus:ring-indigo-600">
          <ng-container *ngIf="!loading.google; else googleSpinner">
            <mat-icon aria-label="google" svgIcon="google" class="w-5 h-5 text-gray-500 dark:text-gray-400 transition duration-75 group-hover:text-gray-900 dark:group-hover:text-white"></mat-icon>
            <span>Google</span>
          </ng-container>
          <ng-template #googleSpinner>
            <span class="flex h-6 w-16 items-center justify-center">
              <mat-spinner [diameter]="24" class="stroke-blue-500"></mat-spinner>
            </span>
          </ng-template>
        </button>
      </div>
      <div class="flex items-center gap-2 my-1">
        <div class="flex-1 h-px bg-gradient-to-r from-transparent via-indigo-300 to-transparent dark:via-indigo-700"></div>
        <span class="text-xs text-gray-400 dark:text-gray-500 font-medium">or</span>
        <div class="flex-1 h-px bg-gradient-to-l from-transparent via-indigo-300 to-transparent dark:via-indigo-700"></div>
      </div>
      <!-- Identifier -->
      <div>
        <label for="identifier" class="block text-xs font-medium text-gray-700 dark:text-gray-200 mb-0.5">Email or Phone Number</label>
        <input id="identifier" autocomplete="off" formControlName="identifier" required type="text" placeholder="Enter your Email or Phone Number"
          class="cc-input block w-full rounded-lg border border-slate-200 dark:border-gray-700 bg-slate-50/70 dark:bg-gray-800 px-2 py-1.5 text-xs text-gray-900 dark:text-gray-100 placeholder-slate-400 shadow-sm transition-all duration-300 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 dark:focus:ring-indigo-500 outline-none hover:bg-slate-100 dark:hover:bg-gray-700 hover:border-indigo-400 dark:hover:border-indigo-400 hover:shadow-lg dark:hover:shadow-indigo-900/20"
          [ngClass]="{'border-red-500 dark:border-red-400': loginForm.get('identifier')?.invalid && (loginForm.get('identifier')?.dirty || loginForm.get('identifier')?.touched), 'border-green-500 dark:border-green-400': loginForm.get('identifier')?.valid && (loginForm.get('identifier')?.dirty || loginForm.get('identifier')?.touched)}"
        />
        <small *ngIf="loginForm.get('identifier')?.invalid && (loginForm.get('identifier')?.dirty || loginForm.get('identifier')?.touched)" class="text-red-600 dark:text-red-300 font-medium mt-0.5 block text-xs">
          <ng-container *ngIf="loginForm.get('identifier')?.errors?.['required']">Email or Phone Number is required</ng-container>
          <ng-container *ngIf="loginForm.get('identifier')?.errors?.['pattern']">Invalid identifier format</ng-container>
        </small>
      </div>
      <!-- Password or Verification Code -->
      <ng-container *ngIf="!phoneVerificationSent; else codeInput">
        <div>
          <label for="password" class="block text-xs font-medium text-gray-700 dark:text-gray-200 mb-0.5">Password</label>
          <input id="password" type="password" formControlName="password" required placeholder="Enter your Password" autocomplete="current-password"
            class="cc-input block w-full rounded-lg border border-slate-200 dark:border-gray-700 bg-slate-50/70 dark:bg-gray-800 px-2 py-1.5 text-xs text-gray-900 dark:text-gray-100 placeholder-slate-400 shadow-sm transition-all duration-300 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 dark:focus:ring-indigo-500 outline-none hover:bg-slate-100 dark:hover:bg-gray-700 hover:border-indigo-400 dark:hover:border-indigo-400 hover:shadow-lg dark:hover:shadow-indigo-900/20"
            [ngClass]="{'border-red-500 dark:border-red-400': loginForm.get('password')?.invalid && (loginForm.get('password')?.dirty || loginForm.get('password')?.touched), 'border-green-500 dark:border-green-400': loginForm.get('password')?.valid && (loginForm.get('password')?.dirty || loginForm.get('password')?.touched)}"
          />
          <small *ngIf="loginForm.get('password')?.invalid && (loginForm.get('password')?.dirty || loginForm.get('password')?.touched)" class="text-red-600 dark:text-red-300 font-medium mt-0.5 block text-xs">
            <ng-container *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</ng-container>
          </small>
        </div>
      </ng-container>
      <ng-template #codeInput>
        <div>
          <label for="verificationCode" class="block text-xs font-medium text-gray-700 dark:text-gray-200 mb-0.5">Verification Code</label>
          <input id="verificationCode" type="text" formControlName="verificationCode" required placeholder="Enter 6-digit code"
            class="cc-input block w-full rounded-lg border border-slate-200 dark:border-gray-700 bg-slate-50/70 dark:bg-gray-800 px-2 py-1.5 text-xs text-gray-900 dark:text-gray-100 placeholder-slate-400 shadow-sm transition-all duration-300 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 dark:focus:ring-indigo-500 outline-none hover:bg-slate-100 dark:hover:bg-gray-700 hover:border-indigo-400 dark:hover:border-indigo-400 hover:shadow-lg dark:hover:shadow-indigo-900/20"
            [ngClass]="{'border-red-500 dark:border-red-400': loginForm.get('verificationCode')?.invalid && (loginForm.get('verificationCode')?.dirty || loginForm.get('verificationCode')?.touched), 'border-green-500 dark:border-green-400': loginForm.get('verificationCode')?.valid && (loginForm.get('verificationCode')?.dirty || loginForm.get('verificationCode')?.touched)}"
          />
          <small *ngIf="loginForm.get('verificationCode')?.invalid && (loginForm.get('verificationCode')?.dirty || loginForm.get('verificationCode')?.touched)" class="text-red-600 dark:text-red-300 font-medium mt-0.5 block text-xs">
            <ng-container *ngIf="loginForm.get('verificationCode')?.errors?.['required']">Verification code is required.</ng-container>
            <ng-container *ngIf="loginForm.get('verificationCode')?.errors?.['minlength'] || loginForm.get('verificationCode')?.errors?.['maxlength']">Code must be 6 digits.</ng-container>
          </small>
        </div>
        <div id="recaptcha-container"></div>
        <button type="button" (click)="resetAuthFlow()" class="mt-3 w-full rounded bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-3 shadow transition-all duration-150 outline-none">Back / Resend</button>
      </ng-template>
      <!-- Links -->
      <div class="flex flex-wrap gap-2 mt-2">
        <a [routerLink]="['/service/resetpassword']" class="text-xs text-gray-500 dark:text-gray-50 hover:underline">Forgot password?</a>
        <span class="flex-1"></span>
        <a [routerLink]="['/service/signup']" class="text-xs text-gray-500 dark:text-gray-50 hover:underline">Create new account</a>
      </div>
      <!-- Submit Button -->
      <div class="mt-4">
        <button type="submit" [disabled]="!loginForm.valid || loading.email" class="w-full rounded-lg bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-700 dark:hover:bg-indigo-800 text-white font-bold py-2 px-3 shadow-xl transition-all duration-200 ease-in-out disabled:bg-gray-400 dark:disabled:bg-gray-800 disabled:cursor-not-allowed flex items-center justify-center gap-2 outline-none focus:ring-2 focus:ring-indigo-400 dark:focus:ring-indigo-500 cc-focus-ring text-sm">
          <ng-container *ngIf="loading.email; else loginText">
            <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>
          </ng-container>
          <ng-template #loginText>Sign in</ng-template>
        </button>
      </div>
    </form>
  </section>
</main>
<!-- Tailwind-based animated background and card structure, Angular form bindings, and error messages integrated. Light and dark mode supported. -->

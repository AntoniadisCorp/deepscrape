<div
  class="tooltip dark:border-4 dark:border-solid dark:border-gray5 dark:bg-gray6 dark:text-gray-100"
  [ngClass]="['tooltip--' + position]"
  [style.left.px]="left"
  [style.top.px]="top"
  [class.tooltip--visible]="visible"
  [@tooltipAnimation]="animationState"
  (@tooltipAnimation.done)="afterHide($event)"
>
  {{ tooltip }}
</div>

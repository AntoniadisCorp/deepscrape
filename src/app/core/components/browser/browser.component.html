<div class="browser-container">  <!-- Connection controls -->
  <div class="controls">
    <button 
      *ngIf="!connected" 
      [disabled]="connecting" 
      (click)="startStream()" 
      class="start-button">
      {{connecting ? 'Connecting...' : 'Start Remote Browser'}}
    </button>
    
    <div *ngIf="error" class="error-message">
      {{error}}
    </div>
    
    <!-- Control panel (visible when connected) -->
    <app-control 
      *ngIf="connected" 
      #control 
      [hasControl]="hasControl"
      (controlChanged)="onControlChanged($event)">
    </app-control>
  </div>
    <!-- Video stream container -->
  <div class="video-wrapper" [class.active]="connected">    <!-- Floating controls -->
    <div *ngIf="connected" class="floating-controls">      <button class="control-button clipboard-button" title="Open clipboard (Ctrl+V)" (click)="openClipboard()">
        <!-- SVG Clipboard Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24">
          <path d="M0 0h24v24H0V0z" fill="none"/>
          <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
        </svg>
      </button>
      
      <button class="control-button resolution-button" title="Change resolution" (click)="openResolution()">
        <!-- SVG Resolution Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24">
          <path d="M0 0h24v24H0V0z" fill="none"/>
          <path d="M19 12h-2v3h-3v2h5v-5zM7 9h3V7H5v5h2V9zm14-6H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16.01H3V4.99h18v14.02z"/>
        </svg>
      </button>
      
      <button class="control-button fullscreen-button" title="Fullscreen (F11)" (click)="requestFullscreen()">
        <!-- SVG Fullscreen Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24">
          <path d="M0 0h24v24H0V0z" fill="none"/>
          <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
      </button>
    </div>
      <!-- Added webkit-playsinline for iOS and playsInline for React-style props -->
    <video #video id="remote" class="remote-video" playsInline webkit-playsinline="true" muted></video>
    
    <!-- Autoplay blocked overlay with play button -->
    <div *ngIf="autoplayBlocked && connected" class="autoplay-blocked-overlay">
      <button class="play-button" (click)="startPlayback()">
        <svg xmlns="http://www.w3.org/2000/svg" height="48" viewBox="0 0 24 24" width="48">
          <path d="M0 0h24v24H0z" fill="none"/>
          <path fill="white" d="M8 5v14l11-7z"/>
        </svg>
        <span>Click to Play</span>
      </button>
      <p class="autoplay-message">Autoplay was blocked by your browser</p>
    </div>
      <!-- Interactive overlay for capturing mouse/touch events (using textarea like neko) -->
      <textarea #overlay 
      title="textarea for capturing events"
      class="interactive-overlay bg-transparent" 
      [class.active]="connected" 
      spellcheck="false"
      tabindex="0"
      data-gramm="false"
      (compositionstart)="onCompositionStart()"
      (compositionend)="onCompositionEnd()">
    </textarea>
    
    <!-- Placeholder message (positioned absolutely) -->
    <div *ngIf="!connected" class="placeholder">
      <p>Click "Start Remote Browser" to begin</p>
    </div>

    <!-- Loading indicator -->
    <div *ngIf="connecting" class="loading-indicator">
      <div class="spinner"></div>
      <p>Connecting to remote browser...</p>
    </div>
  </div>
  
  <!-- Optional status indicator -->
  <div *ngIf="connected" class="status-indicator">
    <span class="status-dot connected"></span>
    Connected to remote browser
  </div>

  <div *ngIf="connected" class="control-buttons">
    <button (click)="requestFullscreen()" class="control-button fullscreen-button">
      <span class="button-icon fullscreen-icon">⛶</span>
    </button>
    <button (click)="openClipboard()" class="control-button clipboard-button">
      <span class="button-icon clipboard-icon">📋</span>
    </button>
  </div>
    <app-clipboard #clipboard (clipboardSent)="onClipboardSent($event)"></app-clipboard>
  <app-resolution #resolution (resolutionChanged)="onResolutionChanged($event)"></app-resolution>
</div>

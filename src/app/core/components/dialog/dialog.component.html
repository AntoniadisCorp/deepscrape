<div class="modal-overlay bg-gray-900/[.5]">
  <div
    class="modal-content relative bg-gray-100 dark:bg-gray6 dark:text-gray-100 text-gray5 p-12 py-6">
    <h1 class="mb-4 text-2xl font-bold text-gray-800 dark:text-gray-300 ">{{title()}}</h1>
    @if (subtitle()) {
      <h2 class="mb-4 text-red-700 dark:text-red-300/80">
        <span [innerHTML]="subtitle()"></span>
      </h2>
    }

  <ng-content></ng-content>

  <button
    title="close"
    appRipple
    ripplColor="dark"
    class="!absolute top-2 right-2 flex flex-col items-center cursor-pointer justify-center dark:text-gray-100 border border-transparent focus:border-gray1 focus:border text-center bg-transparent hover:bg-gray-200 dark:hover:bg-gray-700 p-1 rounded-full transition-[colors,border]"
    (click)="close()">
    <mat-icon>close</mat-icon>
  </button>
  <div class="buttons flex gap-8 items-center justify-center">
    <app-dialog-actions [label]="cancelLabel()" class="text-gray6 rounded-lg dark:text-gray-100 hover:text-gray6 hover:bg-gray4/[.1] hover:dark:bg-gray-400/[.4]"></app-dialog-actions>
    <app-dialog-actions
      class="focus:bg-red-500/10 text-red-500 dark:text-red-400/80 hover:bg-red-600/10 dark:hover:bg-red-600/10 rounded-lg"
      [label]="confirmLabel()"
    [isConfirm]="true"></app-dialog-actions>
  </div>
</div>
</div>

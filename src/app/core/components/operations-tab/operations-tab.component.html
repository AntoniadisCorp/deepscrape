<div class="relative w-[1170px] h-[180px] bg-[#2A2E35] border border-[#55665A] rounded-[90px] shadow-lg shadow-[rgba(68,87,69,0.32)] p-6">
  <!-- Top section -->
  <div class="flex items-center justify-between mb-4">
    <div class="flex items-center space-x-2">
      <div class="w-2 h-2 bg-[#1D46B9] rounded-full"></div>
      <div class="w-9 h-9 bg-[#D9D9D9] rounded-full border-2 border-[#87CC9E] flex items-center justify-center">
        <img src="assets/svg/spider.svg" alt="Spider" class="w-6 h-6">
      </div>
      <div class="bg-[rgba(111,59,195,0.53)] rounded-[10px] px-4 py-1">
        <span class="text-white text-[12px] font-['Chocolate_Classical_Sans']">{{ userName }}</span>
      </div>
    </div>
    <div class="flex items-center space-x-2">
      <span class="text-[#B4B4B4] text-[11px] font-['Arimo_Hebrew_Subset_Italic']">{{ date }}</span>
      <div class="bg-[#3557B3] rounded-[30px] px-4 py-1">
        <span class="text-white text-[13px] font-['Chocolate_Classical_Sans']">{{ status }}</span>
      </div>
      <button (click)="toggleExpand()" class="w-[45px] h-[48px] flex items-center justify-center">
        <img src="assets/svg/menu-vertical.svg" alt="Menu" class="w-full h-full">
      </button>
    </div>
  </div>

  <!-- Middle section -->
  <div class="mb-4">
    <h2 class="text-white text-[24px] font-['Abhaya_Libre_ExtraBold'] mb-2">{{ title }}</h2>
    <p class="text-[#4979C5] text-[13px] font-['Abel']">{{ url }}</p>
  </div>

  <!-- Collapsible section -->
  <div [@collapseExpand]="isExpanded ? 'expanded' : 'collapsed'">
    <div *ngIf="isExpanded" class="flex items-center justify-between mt-4">
      <div class="flex items-center space-x-2">
        <img src="assets/svg/micro-sd.svg" alt="Micro SD" class="w-[25px] h-[27px]">
        <span class="text-[#232323] text-[11px] font-['Chocolate_Classical_Sans']">:</span>
        <span class="text-transparent bg-clip-text bg-gradient-to-b from-white to-[#8A8A8A] text-[11px] font-['Chocolate_Classical_Sans']">{{ dataSize }}</span>
        <div class="w-px h-[17px] bg-[#638DD0] rounded-[16px] blur-[2px]"></div>
        <img src="assets/svg/electronics.svg" alt="Electronics" class="w-[22px] h-[24px]">
        <span class="text-[#232323] text-[11px] font-['Chocolate_Classical_Sans']">:</span>
        <span class="text-transparent bg-clip-text bg-gradient-to-b from-white to-[#8A8A8A] text-[11px] font-['Chocolate_Classical_Sans']">{{ progress }}</span>
        <div class="w-px h-[17px] bg-[#984AEB] rounded-[16px] blur-[2px]"></div>
        <img src="assets/svg/pocket-watch.svg" alt="Pocket Watch" class="w-[22px] h-[24px]">
        <span class="text-[#232323] text-[11px] font-['Chocolate_Classical_Sans']">:</span>
        <span class="text-transparent bg-clip-text bg-gradient-to-b from-white to-[#8A8A8A] text-[11px] font-['Chocolate_Classical_Sans']">{{ time }}</span>
      </div>
    </div>
  </div>

  <!-- "tap to open" text -->
  <div *ngIf="!isExpanded" class="absolute bottom-4 left-1/2 -translate-x-1/2">
    <span class="text-[#B4B4B4] text-[14px] font-['Arimo_Hebrew_Subset_Italic']">tap to open</span>
  </div>
</div>

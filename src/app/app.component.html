<!-- loading bar for router -->
<ngx-loading-bar
  [includeSpinner]="false"
  [height]="'4px'"
  [color]="'rgb(190 18 60)'"
  class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></ngx-loading-bar>

<!-- Application Screen Size Detector   -->
<app-size-detector></app-size-detector>


<div [@routeAnimation]="getRouteAnimationData(outlet)"
[class]="route() === '/' ? 'from-sky-400 via-blue-400 to-indigo-400' : 'bg-gray-100'"
class="relative bg-gradient-to-br dark:from-gray-900 dark:via-gray-900 dark:to-gray-900 flex flex-col">
  <!-- min-h-screen overflow-hidden  -->
  <app-animated-bg></app-animated-bg>
  @if (!isBrowser || authReady()) {
    <router-outlet #outlet="outlet"></router-outlet>
    @if (isBrowser && showRouteLoader()) {
      <span class="pointer-events-none absolute inset-0 z-[70] flex h-screen w-full items-center justify-center">
        <mat-spinner
          [diameter]="40"
          class="stroke-sky-700 dark:stroke-sky-400"></mat-spinner>
      </span>
    }
  } @else {
    <span class="pointer-events-none absolute inset-0 z-[70] flex h-screen w-full items-center justify-center">
      <mat-spinner
        [diameter]="40"
        class="stroke-sky-700 dark:stroke-sky-400"></mat-spinner>
    </span>
  }
</div>

<app-snackbar
  #snackbar
  [message]="snackbarMessage"
  [action]="snackbarAction"
  [duration]="snackbarDuration"
  [type]="snackbarType"
  (actionClick)="onSnackbarAction()"></app-snackbar>
